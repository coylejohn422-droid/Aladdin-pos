<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aladdin Hot 4 U - Kiosk</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --cherry-red: #B22222; --green-check: #228B22; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('bg.jpg'); background-size: cover; background-position: center; }
        
        /* --- MASTER PRINTER SOLUTION --- */
        @media print {
            body, html { background: white !important; height: auto !important; overflow: visible !important; }
            #header-stack, #sidebar, #menu-section, #basket-fab, #size-picker-overlay, .remove-btn, button, #ui-tray-header, #confirm-btn-ui { 
                display: none !important; 
            }
            #order-tray { 
                position: static !important; 
                display: block !important; 
                width: 100% !important; 
                border: none !important; 
                box-shadow: none !important; 
                padding: 0 !important;
                margin: 0 !important;
            }
            #tray-items { background: white !important; padding: 0 !important; overflow: visible !important; }
            .print-only-header { display: block !important; text-align: center; border-bottom: 2px solid #000; margin-bottom: 20px; padding-bottom: 10px; }
            .food-item-row { 
                border-bottom: 1px solid #eee !important; 
                padding: 10px 0 !important; 
                background: white !important;
                display: flex !important;
                justify-content: space-between !important;
                page-break-inside: avoid;
            }
            .total-row-print {
                display: flex !important;
                justify-content: space-between !important;
                font-size: 24px !important;
                margin-top: 20px !important;
                border-top: 2px dashed #000 !important;
                padding-top: 10px !important;
                font-weight: 900;
            }
        }
        .print-only-header, .total-row-print { display: none; }

        /* --- UI STYLES --- */
        #header-stack { width: 100%; background: white; text-align: center; border-bottom: 2px solid #eee; padding: 12px 0; z-index: 10; }
        .brand-title { font-family: 'Aref Ruqaa', serif; font-size: 42px; color: var(--cherry-red); margin: 0; font-style: italic; }
        #content { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 130px; background: #f8f8f8; display: flex; flex-direction: column; padding: 15px 5px; gap: 20px; overflow-y: auto; border-right: 1px solid #ddd; }
        .cat-btn { width: 100%; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 800; color: #555; gap: 8px; }
        .cat-icon { width: 70px; height: 70px; border-radius: 18px; background: white; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; }
        .active-cat .cat-icon { border: 3px solid var(--cherry-red); transform: scale(1.1); }
        .active-cat { color: var(--cherry-red); }
        #menu-section { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
        .food-card { background: white; border-radius: 15px; height: 85px; padding: 0 18px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #eee; box-shadow: 0 3px 8px rgba(0,0,0,0.06); cursor: pointer; transition: 0.2s; }
        .food-info { display: flex; align-items: center; gap: 12px; flex: 1; overflow: hidden; }
        .food-emoji { font-size: 26px; }
        .text-wrap { display: flex; flex-direction: column; overflow: hidden; }
        .food-name { font-weight: 700; font-size: 14px; color: #222; margin: 0; line-height: 1.2; }
        .food-desc { font-size: 11px; color: #777; font-weight: 400; margin: 2px 0 0 0; line-height: 1.1; }
        .food-price { color: var(--cherry-red); font-weight: 900; font-size: 14px; margin-left: 10px; }
        #basket-fab { position: fixed; bottom: 30px; right: 30px; width: 85px; height: 85px; border-radius: 50%; background: var(--cherry-red); color: white; border: none; cursor: pointer; z-index: 100; box-shadow: 0 10px 30px rgba(178, 34, 34, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .basket-count { position: absolute; top: -5px; right: -5px; background: var(--green-check); color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 3px solid white; }
        #order-tray { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; z-index: 1000; transition: 0.4s; }
        #order-tray.open { right: 0; }
        @media (min-width: 600px) { #order-tray { width: 450px; right: -450px; border-left: 1px solid #ddd; } }
    </style>
</head>
<body>

    <div id="header-stack"><div class="brand-title">Aladdin Hot 4 U</div></div>

    <div id="content">
        <div id="sidebar"></div>
        <div id="menu-section"><div id="menu-grid"></div></div>
    </div>

    <button id="basket-fab" onclick="toggleTray()">
        <span style="font-size: 32px;">🛒</span>
        <span id="basket-total-label" style="font-size: 13px; font-weight: 900;">£0.00</span>
        <div class="basket-count" id="item-count">0</div>
    </button>

    <div id="order-tray">
        <div class="print-only-header">
            <h1 style="margin:0; font-family:'Aref Ruqaa';">ALADDIN HOT 4 U</h1>
            <p>ORDER RECEIPT</p>
        </div>

        <div id="ui-tray-header" style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
            <button onclick="toggleTray()" style="border:none; background:none; font-size:18px; font-weight:900; color:var(--cherry-red); cursor:pointer;">← BACK</button>
            <h2 style="margin:0; font-family:'Aref Ruqaa'; font-size:28px;">My Basket</h2>
        </div>

        <div id="tray-items" style="flex:1; padding:25px; overflow-y:auto; background:#fbfbfb;"></div>

        <div style="padding:30px; border-top:1px solid #eee; background: white;">
            <div class="total-row-print">
                <span>TOTAL:</span><span id="total-val-print">£0.00</span>
            </div>
            <div id="confirm-btn-ui">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:900; font-size:28px;"><span>Total</span><span id="total-val">£0.00</span></div>
                <button onclick="window.print()" style="width:100%; padding:22px; background:var(--green-check); color:white; border:none; border-radius:15px; font-weight:900; font-size:20px; cursor:pointer;">CONFIRM ORDER</button>
            </div>
        </div>
    </div>

    <script>
        // (All Category Data and Logic remains exactly as your provided code)
        let tray = [];
        let currentCatIndex = 0;

        const categories = [
            {n: "Starters", i: "🥘", data: [
                { n: "Vegetable Pakora", p: { "Regular": 4.95, "Large": 6.45 }, i: "🥦" },
                { n: "Mushroom Pakora", p: { "Regular": 4.95, "Large": 6.45 }, i: "🍄" },
                { n: "Chicken Pakora", p: { "Regular": 6.95, "Large": 8.45 }, i: "🍗" },
                { n: "Mixed Pakora", p: { "Regular": 6.95, "Large": 8.45 }, i: "🍱" },
                { n: "Hot Wings", p: { "Regular": 6.95, "Large": 8.95 }, i: "🔥" },
                { n: "BBQ Wings", p: { "Regular": 6.95, "Large": 8.95 }, i: "🍗" },
                { n: "Onion Rings", p: { "Regular": 4.45, "Large": 5.95 }, i: "🧅" },
                { n: "Garlic Mushrooms", p: { "Standard": 5.95 }, i: "🧄" },
                { n: "Garlic Bread", p: { "Standard": 3.95 }, i: "🍞" },
                { n: "Garlic Bread with Cheese", p: { "Standard": 4.95 }, i: "🧀" },
                { n: "Poppadoms", p: { "Standard": 1.50 }, i: "🍪" },
                { n: "Spiced Onions", p: { "Standard": 1.50 }, i: "🧅" }
            ]},
            {n: "European Dishes", i: "🍲", data: [
                { n: "Chips", p: { "Regular": 3.45, "Large": 4.95 }, i: "🍟" },
                { n: "Curly Chips", p: { "Regular": 3.95, "Large": 5.45 }, i: "🍟" },
                { n: "Chips & Cheese", p: { "Regular": 4.95, "Large": 6.45 }, i: "🧀" },
                { n: "Chips & Donner Meat", p: { "Regular": 6.95, "Large": 8.95 }, i: "🥙" },
                { n: "Chips, Cheese & Donner Meat", p: { "Regular": 7.95, "Large": 9.95 }, i: "🥙" },
                { n: "Fish & Chips With Salad", p: { "Regular": 8.45, "Large": 10.95 }, i: "🐟" }
            ]},
            {n: "Speciality Dishes", i: "💎", data: [
                { n: "Aladdin Special", d: "Diced chicken, lamb & mushrooms in herby spices", p: { "Standard": 10.95 }, i: "👑" },
                { n: "Tikka Tandoori Masala", d: "Marinated spice with onion & green pepper", p: { "Chicken Tikka": 9.45, "Lamb Tikka": 10.45, "King Prawn": 12.95 }, i: "🥘" },
                { n: "Chasni", d: "Mild, tangy & creamy sauce", p: { "Standard": 7.95, "Tikka / Lamb": 9.95 }, i: "🧴" }
            ]},
            {n: "Traditional Dishes", i: "🥘", data: [
                { n: "Curry", d: "Mild and smooth", p: { "Standard": 7.95, "Tikka / Lamb": 9.95 }, i: "🥣" },
                { n: "Bhuna", d: "Rich tomato and onion base", p: { "Standard": 7.95, "Tikka / Lamb": 9.95 }, i: "🥘" },
                { n: "Madras", d: "Hot curry", p: { "Standard": 7.95, "Tikka / Lamb": 9.95 }, i: "🔥" }
            ]},
            {n: "Kormas", i: "🥣", data: [
                { n: "Korma", d: "Creamy coconut & fresh cream sauce (mild)", p: { "Standard": 8.45, "Lamb / Tikka": 10.45 }, i: "🥥" }
            ]},
            {n: "Biryani", i: "🍚", data: [
                { n: "Chicken Biryani", p: { "Standard": 11.95 }, i: "🍗" },
                { n: "Lamb Biryani", p: { "Standard": 11.95 }, i: "🥩" }
            ]},
            {n: "Rice & Bread", i: "🍞", data: []}, 
            {n: "Pizza", i: "🍕", data: []}
        ];

        function init() {
            const side = document.getElementById('sidebar');
            categories.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${i===0?'active-cat':''}`;
                btn.innerHTML = `<div class="cat-icon">${cat.i}</div>${cat.n}`;
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
                    btn.classList.add('active-cat');
                    currentCatIndex = i;
                    showItems(i);
                };
                side.appendChild(btn);
            });
            showItems(0);
        }

        function showItems(catIdx) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            const items = categories[catIdx].data;
            if(items.length > 0) {
                items.forEach((item, idx) => {
                    const sizes = Object.keys(item.p);
                    const displayPrice = sizes.length > 1 ? `from £${item.p[sizes[0]].toFixed(2)}` : `£${item.p[sizes[0]].toFixed(2)}`;
                    grid.innerHTML += `
                        <div class="food-card" onclick="handleItemClick(${idx})">
                            <div class="food-info">
                                <span class="food-emoji">${item.i}</span>
                                <div class="text-wrap">
                                    <p class="food-name">${item.n}</p>
                                    ${item.d ? `<p class="food-desc">${item.d}</p>` : ''}
                                </div>
                            </div>
                            <span class="food-price">${displayPrice}</span>
                        </div>`;
                });
            } else {
                grid.innerHTML = `<p style="padding:20px; font-weight:700; color:#888;">Items for ${categories[catIdx].n} coming soon...</p>`;
            }
        }

        function handleItemClick(itemIdx) {
            const item = categories[currentCatIndex].data[itemIdx];
            const sizes = Object.keys(item.p);
            if(sizes.length === 1) { add(item.n, item.p[sizes[0]], ""); return; }
            openSizePicker(itemIdx);
        }

        function openSizePicker(itemIdx) {
            const item = categories[currentCatIndex].data[itemIdx];
            const sizes = Object.keys(item.p);
            let options = sizes.map(s => `<button onclick="add('${item.n}', ${item.p[s]}, '${s}'); closePicker();" style="width:100%; padding:18px; margin-bottom:12px; border-radius:15px; border:2px solid #eee; font-weight:800; background:white; font-size:16px; color:#333; cursor:pointer;"><div style="display:flex; justify-content:space-between;"><span>${s}</span> <span>£${item.p[s].toFixed(2)}</span></div></button>`).join('');
            const picker = document.createElement('div');
            picker.id = "size-picker-overlay";
            picker.innerHTML = `<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px);"><div style="background:white; padding:30px; border-radius:25px; width:85%; max-width:400px; box-shadow:0 20px 50px rgba(0,0,0,0.3);"><h2 style="margin-top:0; font-family:'Aref Ruqaa'; color:var(--cherry-red); font-size:32px;">${item.n}</h2>${options}<button onclick="closePicker()" style="background:none; border:none; color:#999; font-weight:700; margin-top:10px; width:100%; padding:10px; cursor:pointer;">Cancel</button></div></div>`;
            document.body.appendChild(picker);
        }

        function add(n, p, size) { 
            const displayName = size ? `${n} (${size})` : n;
            tray.push({n: displayName, p}); 
            renderTray();
        }

        function renderTray() {
            const cont = document.getElementById('tray-items');
            cont.innerHTML = ''; let total = 0;
            if (tray.length === 0) {
                cont.innerHTML = `<div style="text-align:center; margin-top:80px; color:#ddd;"><span style="font-size:100px;">🛒</span><p style="font-weight:900; font-size:20px;">Empty</p></div>`;
            } else {
                tray.forEach((item, index) => { 
                    total += item.p; 
                    cont.innerHTML += `<div class="food-item-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; background:#fff; padding:18px; border-radius:15px; border:1px solid #eee;"><div><b style="font-size:16px;">${item.n}</b></div><div style="display:flex; align-items:center; gap:20px;"><b>£${item.p.toFixed(2)}</b><button class="remove-btn" onclick="remove(${index})" style="background:#fee; border:none; color:var(--cherry-red); width:38px; height:38px; border-radius:50%; font-weight:900; cursor:pointer;">✕</button></div></div>`; 
                });
            }
            document.getElementById('total-val').innerText = `£${total.toFixed(2)}`;
            document.getElementById('total-val-print').innerText = `£${total.toFixed(2)}`;
            document.getElementById('basket-total-label').innerText = `£${total.toFixed(2)}`;
            document.getElementById('item-count').innerText = tray.length;
        }

        function remove(index) { tray.splice(index, 1); renderTray(); }
        function closePicker() { const p = document.getElementById('size-picker-overlay'); if(p) p.remove(); }
        function toggleTray() { document.getElementById('order-tray').classList.toggle('open'); }
        window.onload = init;
    </script>
</body>
</html>
