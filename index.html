<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#991b1b">
    <title>Aladdin POS Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-deep: #450a0a; --red-mid: #991b1b; --gold: #fbbf24; 
            --dark: #1a1a1a; --bg: #fffbf0; --green: #059669; 
            --heading-font: 'Archivo Black', sans-serif; --body-font: 'Inter', sans-serif; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--body-font); margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* --- SIDEBAR & GLOWING HEADING --- */
        #nav { 
            width: 240px; background: linear-gradient(180deg, var(--red-deep) 0%, var(--red-mid) 50%, var(--red-deep) 100%); 
            display: flex; flex-direction: column; padding: 20px 15px; border-right: 6px solid var(--gold); 
            order: 1; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.4);
        }
        .nav-header { color: white; font-family: var(--heading-font); font-size: 22px; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: 1px; margin: 0; }
        .nav-sub-brand { 
            color: var(--gold); font-family: var(--heading-font); font-size: 34px; font-style: italic; text-align: center; margin-bottom: 25px;
            text-shadow: 3px 3px 0px #000, 0 0 20px #ff0000; animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow { from { transform: scale(1); filter: drop-shadow(0 0 5px #ff0000); } to { transform: scale(1.03); filter: drop-shadow(0 0 15px #ff4d4d); } }
        .cat-btn { 
            width: 100%; padding: 15px 10px; margin-bottom: 12px; border: 2px solid #b45309; border-radius: 12px; 
            font-weight: 900; cursor: pointer; background: var(--gold); color: #451a03; font-size: 11px; 
            text-transform: uppercase; box-shadow: 0 4px 0 #78350f; 
        }
        .active-cat { background: var(--dark); color: var(--gold); transform: translateX(8px); box-shadow: -5px 5px 0px #000; border: 2px solid var(--gold); }

        /* --- MAIN MENU AREA --- */
        #main { flex: 1; display: flex; flex-direction: column; order: 2; position: relative; }
        #header-area { padding: 15px 30px; background: white; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        #cat-display-title { margin: 0; color: #b91c1c; font-family: var(--heading-font); font-size: 24px; text-transform: uppercase; }
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; }
        .item-card { background: white; border-radius: 15px; padding: 15px; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .item-name { font-weight: 900; font-size: 15px; color: var(--dark); margin-bottom: 12px; line-height: 1.2; }
        .size-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .size-btn { padding: 12px 2px; border-radius: 10px; border: 1px solid #ddd; background: #fcfcfc; font-weight: 800; font-size: 11px; cursor: pointer; color: var(--dark); box-shadow: 0 2px 0 #ccc; }
        .size-btn:active { background: var(--gold); transform: translateY(2px); box-shadow: none; }

        /* --- MANAGER PANEL --- */
        #mgr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .mgr-content { background: white; width: 96%; height: 94%; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; }
        .mgr-layout { display: flex; flex-direction: row; gap: 20px; flex: 1; overflow: hidden; margin-top: 15px; }
        .mgr-sidebar { width: 220px; flex-shrink: 0; border-right: 2px solid #f0f0f0; padding-right: 15px; }
        .mgr-main-view { flex: 1; overflow-y: auto; padding-right: 10px; }
        .mgr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .mgr-table th, .mgr-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .mgr-input { width: 80px; padding: 6px; font-weight: bold; border: 2px solid var(--gold); border-radius: 5px; }
        .mgr-nav-btn { background: #333; color: white; padding: 14px; border: none; border-radius: 10px; margin-bottom: 12px; cursor: pointer; font-weight: 900; width: 100%; font-size: 12px; }

        /* --- TRAY & PRINTING --- */
        #cart { width: 220px; background: white; border-left: 5px solid var(--gold); position: fixed; right: -230px; top: 0; height: 100%; z-index: 1000; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        #cart.visible { right: 0; }
        #view-tray-btn { position: fixed; bottom: 25px; right: 25px; background: var(--green); color: white; padding: 18px 35px; border-radius: 50px; font-weight: 900; font-size: 18px; border: none; z-index: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.4); cursor: pointer; }

        @media print {
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; width: 100%; font-family: monospace; }
            .print-order-id { font-size: 60pt; font-weight: 900; text-align: center; border: 8px solid black; padding: 20px; margin: 20px 0; }
        }
        #print-area { display: none; }
    </style>
</head>
<body>

    <div id="nav">
        <div class="nav-header">ALADDIN</div>
        <div class="nav-sub-brand">HOT 4 U</div>
        <div id="cat-list"></div>
    </div>

    <div id="main">
        <div id="header-area">
            <h2 id="cat-display-title">MENU</h2>
            <button onclick="toggleMgrModal()" style="background:none; border:none; font-size:28px; cursor:pointer; opacity: 0.1;">⚙️</button>
        </div>
        <div id="menu-grid"></div>
    </div>

    <div id="mgr-modal">
        <div class="mgr-content">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h2 style="font-family: var(--heading-font); margin:0; color:#991b1b;">MANAGER CONTROL</h2>
                <button onclick="toggleMgrModal()" style="font-size:35px; border:none; background:none; cursor:pointer;">✕</button>
            </div>
            <div class="mgr-layout">
                <div class="mgr-sidebar">
                    <button class="mgr-nav-btn" onclick="toggleHistory()">📜 DAILY SALES</button>
                    <button class="mgr-nav-btn" style="background:var(--green);" onclick="addNewItem()">✚ ADD FOOD ITEM</button>
                    <button class="mgr-nav-btn" style="background:#dc2626;" onclick="clearHistory()">🧹 RESET SALES</button>
                    <hr>
                    <button class="mgr-nav-btn" style="background:#555;" onclick="resetMenu()">⚠️ FACTORY RESET</button>
                </div>
                <div class="mgr-main-view"><h4 id="mgr-cat-label" style="margin-top:0;">Edit</h4><table class="mgr-table" id="mgr-edit-table"></table></div>
            </div>
        </div>
    </div>

    <div id="cart">
        <div style="background:var(--dark); color:var(--gold); padding:15px; text-align:center; font-weight:900;">TRAY</div>
        <div id="cart-items" style="flex:1; overflow-y:auto; padding:15px;"></div>
        <div style="padding:20px; border-top:2px solid #eee; background:#fafafa;">
            <div id="total-price" style="text-align:center; font-size:24px; font-weight:900; color:#991b1b; margin-bottom:15px;">£0.00</div>
            <button onclick="sendToKitchen()" style="width:100%; padding:18px; background:var(--green); color:white; border:none; border-radius:12px; font-weight:900; font-size:16px; cursor:pointer;">PRINT ORDER</button>
            <button onclick="toggleCart()" style="width:100%; background:none; border:none; color:#999; margin-top:10px; font-size:11px;">CLOSE</button>
        </div>
    </div>

    <div id="history-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:80%; height:80%; background:white; z-index:4000; border-radius:20px; padding:30px; flex-direction:column; box-shadow:0 0 100px black;">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>TODAY'S ORDERS</h2><button onclick="toggleHistory()" style="font-size:35px; border:none; background:none;">✕</button></div>
        <div id="history-list" style="flex:1; overflow-y:auto; margin-top:20px;"></div>
        <div id="history-total" style="font-size:28px; font-weight:900; text-align:right; border-top:6px solid var(--gold); padding-top:15px;">TOTAL: £0.00</div>
    </div>

    <button id="view-tray-btn" onclick="toggleCart()">🛒 TRAY (<span id="cart-badge">0</span>)</button>
    <div id="print-area"></div>

    <script>
        let tray = [];
        let orderHistory = JSON.parse(localStorage.getItem('aladdinHistory')) || [];
        let currentCategory = "Starters";

        const defaultMenu = {
            "Starters": [
                { n: "Veg Pakora", pR: 4.50, pL: 6.00, type: "dual" },
                { n: "Chicken Pakora", pR: 5.95, pL: 7.95, type: "dual" },
                { n: "Mixed Pakora", pR: 5.50, pL: 7.50, type: "dual" },
                { n: "Mushroom Pakora", pR: 4.50, pL: 6.00, type: "dual" },
                { n: "Garlic Bread", p: 3.50, type: "single" },
                { n: "Garlic Bread Cheese", p: 4.50, type: "single" },
                { n: "Chips & Cheese", pR: 4.50, pL: 5.50, type: "dual" }
            ],
            "Pizzas": [
                { n: "Margherita", p7: 7.50, p10: 9.50, p12: 11.50, p16: 15.50, type: "quad" },
                { n: "Pepperoni", p7: 8.50, p10: 10.50, p12: 12.50, p16: 16.50, type: "quad" },
                { n: "Hawaiian", p7: 8.50, p10: 10.50, p12: 12.50, p16: 16.50, type: "quad" },
                { n: "Meat Feast", p7: 9.50, p10: 12.50, p12: 14.50, p16: 18.50, type: "quad" }
            ],
            "Kebabs": [
                { n: "Donner Kebab", pR: 6.95, pL: 8.95, pK: 10.95, type: "triple" },
                { n: "Chicken Tikka Kebab", pR: 7.95, pL: 9.95, pK: 11.95, type: "triple" },
                { n: "Shish Kebab", pR: 8.50, pL: 10.50, pK: 12.50, type: "triple" }
            ],
            "Burgers": [
                { n: "Beef Burger", pS: 4.95, pD: 6.50, type: "burger" },
                { n: "Cheeseburger", pS: 5.50, pD: 7.00, type: "burger" },
                { n: "Chicken Burger", pS: 5.50, pD: 7.00, type: "burger" }
            ],
            "Calzones": [
                { n: "Donner Calzone", pR: 9.50, pL: 11.50, type: "dual" },
                { n: "Chicken Tikka Calzone", pR: 10.50, pL: 12.50, type: "dual" },
                { n: "Mixed Calzone", pR: 11.50, pL: 13.50, type: "dual" }
            ],
            "Wraps & Hoagies": [
                { n: "Donner Wrap", p: 6.50, type: "single" },
                { n: "Chicken Tikka Wrap", p: 7.50, type: "single" },
                { n: "Donner Hoagie", p: 8.50, type: "single" },
                { n: "Mixed Hoagie", p: 9.50, type: "single" }
            ],
            "Drinks": [
                { n: "Coke Can", p: 1.50, type: "single" },
                { n: "Diet Coke Can", p: 1.50, type: "single" },
                { n: "Irn Bru Can", p: 1.50, type: "single" },
                { n: "Coke 1.5L", p: 3.20, type: "single" }
            ]
        };

        let menuData = JSON.parse(localStorage.getItem('aladdinMenu')) || defaultMenu;

        function init() {
            const nav = document.getElementById('cat-list'); nav.innerHTML = '';
            Object.keys(menuData).forEach(cat => {
                const btn = document.createElement('button'); btn.className = 'cat-btn' + (cat === currentCategory ? ' active-cat' : '');
                btn.innerText = cat; btn.onclick = () => { currentCategory = cat; renderActive(); }; nav.appendChild(btn);
            });
            renderActive();
        }

        function renderActive() {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active-cat', b.innerText === currentCategory));
            showCat(currentCategory); renderMgrTable();
        }

        function showCat(catName) {
            const grid = document.getElementById('menu-grid'); grid.innerHTML = ''; document.getElementById('cat-display-title').innerText = catName;
            menuData[catName].forEach((item) => {
                const card = document.createElement('div'); card.className = 'item-card';
                let html = `<div class="item-name">${item.n}</div><div class="size-grid">`;
                getSizes(item).forEach(sz => { html += `<button class="size-btn" onclick="add('${item.n} (${sz[0]})', ${item[sz[1]]})">${sz[0]}<br>£${item[sz[1]].toFixed(2)}</button>`; });
                card.innerHTML = html + `</div>`; grid.appendChild(card);
            });
        }

        function renderMgrTable() {
            const table = document.getElementById('mgr-edit-table'); document.getElementById('mgr-cat-label').innerText = "Editing: " + currentCategory;
            table.innerHTML = `<tr><th>Item</th><th>Price</th><th>X</th></tr>`;
            menuData[currentCategory].forEach((item, idx) => {
                let row = `<tr><td><input type="text" style="width:100%" value="${item.n}" onchange="menuData['${currentCategory}'][${idx}].n = this.value; save(); renderActive();"></td><td>`;
                getSizes(item).forEach(sz => { row += `<small>${sz[0]}:</small> £<input type="number" class="mgr-input" step="0.1" value="${item[sz[1]]}" onchange="menuData['${currentCategory}'][${idx}].${sz[1]} = parseFloat(this.value); save(); renderActive();"><br>`; });
                row += `</td><td><button onclick="deleteItem(${idx})" style="color:red; background:none; border:none; font-weight:bold;">✕</button></td></tr>`;
                table.innerHTML += row;
            });
        }

        function getSizes(item) {
            if(item.type === "quad") return [['7"', 'p7'], ['10"', 'p10'], ['12"', 'p12'], ['16"', 'p16']];
            if(item.type === "triple") return [['Reg', 'pR'], ['Lrg', 'pL'], ['Kng', 'pK']];
            if(item.type === "dual") return [['Reg', 'pR'], ['Lrg', 'pL']];
            if(item.type === "burger") return [['Sgl', 'pS'], ['Dbl', 'pD']];
            return [['Price', 'p']];
        }

        function add(n, p) { tray.push({ n, p, id: Date.now() }); renderTray(); if(!document.getElementById('cart').classList.contains('visible')) toggleCart(); }
        function remove(id) { tray = tray.filter(i => i.id !== id); renderTray(); }
        function renderTray() {
            const container = document.getElementById('cart-items'); container.innerHTML = ''; let total = 0;
            tray.forEach(item => { total += item.p; container.innerHTML += `<div style="font-size:11px; padding:8px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;"><span>${item.n}</span><b>£${item.p.toFixed(2)}</b><button onclick="remove(${item.id})" style="border:none; color:red; cursor:pointer; background:none;">✕</button></div>`; });
            document.getElementById('total-price').innerText = `£${total.toFixed(2)}`;
            document.getElementById('cart-badge').innerText = tray.length;
        }

        function sendToKitchen() {
            if (tray.length === 0) return;
            const orderId = Math.floor(1000 + Math.random() * 9000);
            const now = new Date(); let total = 0; tray.forEach(i => total += i.p);
            orderHistory.push({ id: orderId, time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), total: total });
            localStorage.setItem('aladdinHistory', JSON.stringify(orderHistory));
            let pHTML = `<div style="text-align:center; font-family:monospace; padding:20px;"><h2 style="margin:0;">ALADDIN HOT 4 U</h2><div class="print-order-id">#${orderId}</div><hr style="border:1px dashed black;"><table style="width:100%; text-align:left; font-size:20pt; border-collapse:collapse;">`;
            tray.forEach(i => { pHTML += `<tr><td style="padding:10px 0;">${i.n}</td><td style="text-align:right;">£${i.p.toFixed(2)}</td></tr>`; });
            pHTML += `</table><hr style="border:1px dashed black;"><h2>TOTAL: £${total.toFixed(2)}</h2><br><br>.</div>`;
            const printArea = document.getElementById('print-area'); printArea.innerHTML = pHTML; window.print();
            setTimeout(() => { printArea.innerHTML = ''; tray = []; renderTray(); if(document.getElementById('cart').classList.contains('visible')) toggleCart(); }, 600);
        }

        function addNewItem() {
            const name = prompt("Food Name:"); if(!name) return;
            const type = prompt("Size Setup: 1=Single Price, 2=Reg/Lrg, 3=Triple, 4=Pizza(7/10/12/16), 5=Burger", "1");
            let item = { n: name };
            if(type==="1") { item.p=0; item.type="single"; }
            else if(type==="2") { item.pR=0; item.pL=0; item.type="dual"; }
            else if(type==="3") { item.pR=0; item.pL=0; item.pK=0; item.type="triple"; }
            else if(type==="4") { item.p7=0; item.p10=0; item.p12=0; item.p16=0; item.type="quad"; }
            else if(type==="5") { item.pS=0; item.pD=0; item.type="burger"; }
            menuData[currentCategory].push(item); save(); renderActive();
        }

        function deleteItem(idx) { if(confirm("Delete this item?")) { menuData[currentCategory].splice(idx,1); save(); renderActive(); } }
        function save() { localStorage.setItem('aladdinMenu', JSON.stringify(menuData)); }
        function toggleMgrModal() { const m = document.getElementById('mgr-modal'); m.style.display = (m.style.display === 'flex' ? 'none' : 'flex'); }
        function toggleCart() { document.getElementById('cart').classList.toggle('visible'); }
        function toggleHistory() { const h = document.getElementById('history-modal'); h.style.display = (h.style.display === 'flex' ? 'none' : 'flex'); if(h.style.display==='flex') renderHistory(); }
        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = ''; let gt = 0;
            orderHistory.forEach(o => { gt += o.total; list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee; font-family:monospace; font-size:18px;"><span>${o.time}</span><span>Order #${o.id}</span><b>£${o.total.toFixed(2)}</b></div>`; });
            document.getElementById('history-total').innerText = `TOTAL: £${gt.toFixed(2)}`;
        }
        function clearHistory() { if(confirm("Clear sales?")) { orderHistory = []; localStorage.setItem('aladdinHistory', '[]'); renderHistory(); } }
        function resetMenu() { if(confirm("Factory Reset Menu?")) { localStorage.removeItem('aladdinMenu'); location.reload(); } }
        init();
    </script>
</body>
</html>
